version: '3.9'

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-auto-like-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import pyrogram; print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s